<!DOCTYPE html>
<html lang="en">

<head>
	<!--meta tags-->
	<meta charset="UTF-8">
	<meta content="width=device-width, initial-scale=1, maximum-scale=1, shrink-to-fit=no" name="viewport">
	<meta name="robots" content="noindex, nofollow">
	<!--favicon-->
	<link rel="icon" href="assets/images/favicon.png" type="image/png" >
	<!--css-->
	<link href="assets/lib/perfect-scrollbar/css/perfect-scrollbar.css" rel="stylesheet">
	<link href="assets/lib/bootstrap/bootstrap.min.css" rel="stylesheet">
	<link href="assets/css/main.css" rel="stylesheet">

	<title>WinDash Admin Dashboard Bootstrap Template</title>
</head>

<body>
	<!--preloader-->
	<div class="preloader"></div>
	<!--main wrapper start-->
	<div class="main-wrapper">
		<div class="auth-area d-flex align-items-center justify-content-center my-5 my-lg-0">
			<div class="container">
				<div class="row">
					<div class="col-12 col-md-6 col-lg-4 mx-auto">
						<div class="card">
							<div class="card-body">
								<div class="p-3">
									<div class="mb-3 text-center">
										<img src="assets/images/logo-img.png" width="150" alt="logo" >
									</div>
									<div class="text-center mb-4">
										<h5>Login</h5>
										<p class="mb-0">Please log in to your account</p>
									</div>
									<div class="form-body">
										<form>
											<div class="form-group">
												<label for="email" class="form-label">Email</label>
												<input type="email" class="form-control" id="email">
											</div>
											<div class="form-group">
												<label for="password" class="form-label">Password</label>
												<div class="input-group">
													<input type="password" class="form-control" id="password">
												</div>
											</div>
											<div class="row">
												<div class="col-md-6 form-group">
													<div class="form-check form-switch">
														<input class="form-check-input" type="checkbox" id="remember">
														<label class="form-check-label" for="remember">Remember Me</label>
													</div>
												</div>
												<div class="col-md-6 form-group text-end">	<a href="auth-forgot-password.html">Forgot Password ?</a>
												</div>
											</div>
											<div class="form-group">
												<button type="submit" class="btn btn-primary w-100">Sign in</button>
											</div>
											<div class="form-group">
												<div class="text-center ">
													<p class="mb-0">Don't have an account yet? <a href="auth-register.html">Sign up here</a>
													</p>
												</div>
											</div>
										</form>
									</div>
									<div class="login-separater text-center mb-5"> <span>OR SIGN IN WITH</span>
										<hr>
									</div>
									<div class="list-inline contacts-social text-center">
										<a href="javascript:void(0);" class="list-inline-item bg-facebook text-white border-0 rounded-circle"><i class="fab fa-facebook"></i></a>
										<a href="javascript:void(0);" class="list-inline-item bg-twitter text-white border-0 rounded-circle"><i class="fab fa-twitter"></i></a>
										<a href="javascript:void(0);" class="list-inline-item bg-google text-white border-0 rounded-circle"><i class="fab fa-google"></i></a>
										<a href="javascript:void(0);" class="list-inline-item bg-linkedin text-white border-0 rounded-circle"><i class="fab fa-linkedin"></i></a>
									</div>

								</div>
							</div>
						</div>
					</div>
				</div>
				<!--end row-->
			</div>
		</div>
	</div>
	<!--main wrapper end-->

	<!--JavaScript-->
	<script src="assets/lib/bootstrap/bootstrap.bundle.min.js"></script>
	<script src="assets/lib/jquery/jquery.min.js"></script>
	<script src="assets/lib/perfect-scrollbar/js/perfect-scrollbar.js"></script>
	<script src="assets/js/main.js"></script>
</body>

</html>
