# ============================================
# Zone Gateway 配置（公共）
# ============================================
server.port=8080
server.servlet.context-path=/api
spring.profiles.active=dev

# MyBatis-Plus 配置
mybatis-plus.mapper-locations=classpath*:mapper/**/*.xml
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# springdoc OpenAPI 配置
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# Knife4j 增强配置
knife4j.enable=true
knife4j.setting.enable-footer=false

# OpenAPI 文档信息
openapi.api-info.title=Zone API
openapi.api-info.description=Zone System REST API
openapi.api-info.version=1.0

# JWT 配置
jwt.secret=c2VjdXJlLXNlY3JldC1rZXktZm9yLXpvbmUtYXBwbGljYXRpb24tMjAyNQ==
jwt.access-token-expiration=604800000
jwt.refresh-token-expiration=2592000000

# Spring Security debug
logging.level.org.springframework.security=DEBUG
